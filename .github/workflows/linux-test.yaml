name: Testing on Ubuntu

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 1 * *'

jobs:
  ruby-versions:
    uses: ruby/actions/.github/workflows/ruby_versions.yml@master
    with:
      engine: cruby
      min_version: 3.1
  test:
    needs: ruby-versions
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.ruby == 'head' }}
    strategy:
      fail-fast: false
      matrix:
        ruby: ${{ fromJson(needs.ruby-versions.outputs.versions) }}
        os: [ubuntu-latest]
# FIXME: on GitHub action, when cpufreq is not available by default
#        capability: [true, false]
        capability: [false]

    name: Ruby ${{ matrix.ruby }} capability ${{ matrix.capability }} on ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Ruby
        uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a # v1.302.0
        with:
          ruby-version: ${{ matrix.ruby }}
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt -V install libcap-ng-dev
          bundle install
      - name: setup linux capability (cap_dac_read_search=+eip)
        run: sudo setcap cap_dac_read_search=+eip $(command -v ruby)
        if: ${{ matrix.capability }}
      - name: show linux capability
        run: sudo getcap $(command -v ruby)
      - name: Run tests
        run: bundle exec rake test
